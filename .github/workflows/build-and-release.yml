# @format

name: Build and Release Remote Controls

on:
    # 触发规则：dev分支推送（仅构建）、版本标签推送（构建+发布）
    push:
        tags:
            - "V*.*.*.*"
            - "V*.*.*"
            - "V*"
        branches:
            - "dev"

    # 手动触发：仅main分支可执行发布，dev分支手动触发仅构建
    workflow_dispatch:
        inputs:
            version:
                description: "版本号（如：2.2.8 或 2.2.8-test1）"
                required: true
                default: "2.2.8"
                type: string
            update_version_files:
                description: "是否更新版本文件"
                required: false
                default: true
                type: boolean

env:
    PYTHON_VERSION: "3.14.2"
    # 设置UTF-8编码以正确处理中文字符
    PYTHONIOENCODING: "utf-8"
    PYTHONUTF8: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    prepare:
        runs-on: windows-latest
        permissions:
            contents: read
            actions: read
        outputs:
            version: ${{ steps.version.outputs.version }}
            tag_name: ${{ steps.version.outputs.tag_name }}
            is_tag_push: ${{ steps.version.outputs.is_tag_push }}
            is_test_tag: ${{ steps.version.outputs.is_test_tag }}
            skip_job: ${{ steps.version.outputs.skip_job }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4.2.2
              with:
                  fetch-depth: 0

            - name: Extract version from tag or input
              id: version
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  function Resolve-VersionFromTagName {
                    param([Parameter(Mandatory = $true)][string]$TagName)

                    $raw = ($TagName -replace '^V', '')
                    $isTest = $false
                    $buildVersion = $raw

                    # 支持 tag 形式：V3.0.0-test / V3.0.0-test1 / V3.0.0.8-test2
                    if ($raw -match '^(?<base>\d+\.\d+\.\d+(?:\.\d+)?)-test\d*$') {
                      $buildVersion = $matches.base
                      $isTest = $true
                    }

                    # 版本号必须是纯数字点分段（update_version.py 需要）
                    if ($buildVersion -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
                      throw "错误：版本号格式不正确: $raw（构建版本解析为: $buildVersion）。正确格式: X.Y.Z 或 X.Y.Z.B；测试 tag 允许追加 -test 或 -testN（例如 V3.0.2-test1）。"
                    }

                    return [pscustomobject]@{
                      Raw = $raw
                      Build = $buildVersion
                      IsTest = $isTest
                    }
                  }

                  $tagName = ""
                  $isTagPush = $false
                  $skipJob = "false"
                  $resolved = $null

                  if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_type }}" -eq "tag") {
                    $tagName = "${{ github.ref_name }}"
                    $isTagPush = $true
                    
                    # 需求 2：如果 dev 分支推送的标签不带 test，则强制加上
                    $onDev = $false
                    try {
                      $branches = git branch -r --contains ${{ github.sha }}
                      if ($branches -match 'origin/dev') {
                        $onDev = $true
                      }
                    } catch {
                      echo "无法确定分支信息"
                    }

                    if ($onDev -and ($tagName -notmatch '-test')) {
                      $tagName = "$tagName-test"
                      echo "检测到在 dev 分支推送了正式标签，强制追加 -test 后缀: $tagName"
                    }

                    $resolved = Resolve-VersionFromTagName -TagName $tagName
                  } elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
                    $input = "${{ github.event.inputs.version }}"
                    if ($input -match '^V') { $tagName = $input } else { $tagName = "V$input" }
                    $isTagPush = $false
                    $resolved = Resolve-VersionFromTagName -TagName $tagName
                  } else {
                    $tagName = "Build-${{ github.ref_name }}"
                    $isTagPush = $false
                    
                    # 需求 1：如果当前 commit 已有版本标签，则跳过 dev 分支触发的构建
                    if ("${{ github.ref_name }}" -eq "dev") {
                      $tags = git tag --points-at HEAD
                      if ($tags -match 'V\d+') {
                        echo "检测到当前 commit 已有版本标签 ($tags)，跳过 dev 分支触发的构建以避免重复"
                        $skipJob = "true"
                      }
                    }

                    $buildVersion = "0.0.0"
                    if ("${{ github.ref_name }}" -eq "dev" -and $skipJob -eq "false") {
                      # 获取最新标签作为基准
                      $latestTag = ""
                      try {
                        $latestTag = git tag --sort=-v:refname | Select-Object -First 1
                      } catch {
                        $latestTag = ""
                      }

                      if ($latestTag) {
                        # 去掉 V 前缀和 -test 等后缀
                        $baseVersion = ($latestTag -replace '^V', '') -replace '-.*$', ''
                        $parts = $baseVersion.Split('.')
                        
                        # 需求 3：除了参考标签，还要参考最近的 Actions 运行记录来决定 build 号
                        $tagDate = git log -1 --format=%aI $latestTag
                        $runCount = 0
                        try {
                          # 获取自该标签创建以来，dev 分支上成功的 Actions 运行次数
                          # 逻辑优化：排除当前运行 ID，并排除与标签本身关联的运行
                          $currentRunId = "${{ github.run_id }}"
                          $tagSha = git rev-parse "$latestTag^{commit}"
                          $runJson = gh run list --workflow "${{ github.workflow }}" --branch dev --status success --created ">$tagDate" --limit 100 --json databaseId,headSha,displayTitle
                          if ($LASTEXITCODE -eq 0) {
                            $runs = $runJson | ConvertFrom-Json
                            # 过滤：1. 不是当前任务；2. SHA 不等于标签 SHA
                            $filteredRuns = @($runs) | Where-Object { 
                              $_.databaseId -ne $currentRunId -and $_.headSha -ne $tagSha 
                            }
                            # 打印调试信息
                            $filteredRuns | ForEach-Object { echo "计入统计的历史任务: ID=$($_.databaseId), Title=$($_.displayTitle)" }
                            
                            $runCount = $filteredRuns.Count
                            echo "自标签 $latestTag ($tagDate) 以来，检测到 $runCount 次有效的成功 dev 运行记录"
                          } else {
                            echo "警告：gh run list 执行失败，退出代码: $LASTEXITCODE"
                          }
                        } catch {
                          echo "警告：解析 Actions 运行记录失败，将仅基于标签进行递增"
                        }

                        if ($parts.Length -ge 3) {
                          $major = $parts[0]
                          $minor = $parts[1]
                          $patch = $parts[2]
                          
                          if ($parts.Length -eq 3) {
                            # 1.0.0 -> 1.0.0.(runCount + 1)
                            $buildVersion = "$major.$minor.$patch.$($runCount + 1)"
                          } else {
                            # 1.0.0.5 -> 1.0.0.(5 + runCount + 1)
                            $tagBuild = [int]$parts[3]
                            $buildVersion = "$major.$minor.$patch.$($tagBuild + $runCount + 1)"
                          }
                        } else {
                          $buildVersion = "1.0.0.$($runCount + 1)"
                        }
                      } else {
                        $buildVersion = "1.0.0.1"
                      }
                      echo "检测到 dev 分支推送，自动根据最新标签 ($latestTag) 及 Actions 记录递增版本号为: $buildVersion"
                    }

                    $resolved = [pscustomobject]@{
                      Raw = $tagName
                      Build = $buildVersion
                      IsTest = $true
                    }
                    if ($skipJob -eq "false") {
                      echo "检测到分支推送 (${{ github.ref_name }})，执行构建测试而不发布"
                    }
                  }

                  echo "version=$($resolved.Build)" >> $env:GITHUB_OUTPUT
                  echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT
                  echo "is_tag_push=$($isTagPush.ToString().ToLower())" >> $env:GITHUB_OUTPUT
                  echo "is_test_tag=$($resolved.IsTest.ToString().ToLower())" >> $env:GITHUB_OUTPUT
                  echo "skip_job=$skipJob" >> $env:GITHUB_OUTPUT

                  echo "构建版本: $($resolved.Build)"
                  echo "标签名称: $tagName"
                  echo "是否测试标签: $($resolved.IsTest)"
                  echo "是否跳过任务: $skipJob"

    build-and-release:
        needs: prepare
        if: needs.prepare.outputs.skip_job != 'true'
        timeout-minutes: 10
        runs-on: windows-latest
        permissions:
            contents: write
            actions: read
            issues: read
            pull-requests: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4.2.2
              with:
                  fetch-depth: 0

            - name: Set up MSYS2 (MinGW-w64)
              uses: msys2/setup-msys2@v2.29.0
              id: msys2
              with:
                  msystem: MINGW64
                  update: true
                  cache: true
                  install: >-
                      mingw-w64-x86_64-gcc
                      mingw-w64-x86_64-binutils
                      mingw-w64-x86_64-paho.mqtt.c

            - name: Add MinGW64 to PATH
              shell: pwsh
              run: |
                  $msys2Location = "${{ steps.msys2.outputs.msys2-location }}"
                  if (-not $msys2Location) {
                    throw "错误：未获取到 msys2-location 输出"
                  }
                  Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $msys2Location "mingw64\\bin")

            - name: Configure Paho MQTT C root
              shell: pwsh
              run: |
                  # build_main.ps1 requires PAHO_MQTT_C_ROOT (or -PahoRoot) to locate MQTTClient.h and libpaho-mqtt3c.*
                  $msys2Location = "${{ steps.msys2.outputs.msys2-location }}"
                  if (-not $msys2Location) {
                    throw "错误：未获取到 msys2-location 输出"
                  }
                  $pahoRoot = Join-Path $msys2Location "mingw64"
                  Add-Content -Path $env:GITHUB_ENV -Value "PAHO_MQTT_C_ROOT=$pahoRoot"
              
            - name: Install Inno Setup 6
              shell: pwsh
              run: |
                choco install innosetup -y --no-progress

            - name: Set up Python
              uses: actions/setup-python@v5.4.0
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: "pip"

            - name: Create virtual environment
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  python -m venv .venv
                  .\.venv\Scripts\Activate.ps1
                  python -m pip install --upgrade pip setuptools wheel

            - name: Install dependencies
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  .\.venv\Scripts\Activate.ps1

                  echo "=== 安装主要依赖 ==="
                  pip install -r requirements.txt

                  # 验证关键依赖是否正确安装
                  echo "=== 验证依赖安装 ==="
                  python -c "import win32com.client; print('pywin32: OK')"
                  python -c "import tkinter; print('tkinter: OK')"
                  python -c "import psutil; print('psutil: OK')"
                  python -c "import wmi; print('wmi: OK')"
                  python -c "import PyInstaller; print('pyinstaller: OK')"

                  echo "=== 已安装的包 ==="
                  pip list | Select-String -Pattern "pyinstaller|pywin32|psutil|wmi"

            - name: Update version files
              if: ${{ github.event.inputs.update_version_files == 'true' || github.event_name == 'push' }}
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
                  LC_ALL: en_US.UTF-8
                  LANG: en_US.UTF-8
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  # 显式设置Python环境变量
                  $env:PYTHONIOENCODING = "utf-8"
                  $env:PYTHONUTF8 = "1"

                  .\.venv\Scripts\Activate.ps1
                  $version = "${{ needs.prepare.outputs.version }}"

                  # 执行前再次确认编码设置
                  python -c "import sys; print('Python encoding:', sys.stdout.encoding)"

                  python installer/update_version.py $version
                  if ($LASTEXITCODE -ne 0) {
                    throw "版本文件更新失败: $version"
                  }
                  echo "版本文件已更新到: $version"

            - name: Test source files
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  # 显式设置Python环境变量
                  $env:PYTHONIOENCODING = "utf-8"
                  $env:PYTHONUTF8 = "1"

                  .\.venv\Scripts\Activate.ps1

                  echo "=== 验证Python环境 ==="
                  python --version
                  python -c "import sys; print('Python path:', sys.executable)"

                  echo "=== 验证关键依赖 ==="
                  $failed = $false

                  # 当前架构：主程序/托盘为 C 实现；Python 侧主要用于 GUI 与 PyInstaller 构建。
                  # 因此这里只校验 GUI/构建必需的 Python 依赖（避免历史依赖导致构建误失败）。
                  try { python -c "import tkinter; print('✓ tkinter: OK')" } catch { echo "✗ tkinter: MISSING"; $failed = $true }
                  try { python -c "import win32com.client; print('✓ pywin32: OK')" } catch { echo "✗ pywin32: MISSING"; $failed = $true }
                  try { python -c "import psutil; print('✓ psutil: OK')" } catch { echo "✗ psutil: MISSING"; $failed = $true }
                  try { python -c "import wmi; print('✓ wmi: OK')" } catch { echo "✗ wmi: MISSING"; $failed = $true }
                  try { python -c "import PyInstaller; print('✓ pyinstaller: OK')" } catch { echo "✗ pyinstaller: MISSING"; $failed = $true }

                  if ($failed) {
                    echo "❌ 关键依赖缺失，停止构建"
                    exit 1
                  }
                  echo "✅ 关键依赖验证通过，跳过源文件导入测试"

            - name: Build with PyInstaller
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
                  LC_ALL: en_US.UTF-8
                  LANG: en_US.UTF-8
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  # 显式设置Python环境变量
                  $env:PYTHONIOENCODING = "utf-8"
                  $env:PYTHONUTF8 = "1"

                  .\.venv\Scripts\Activate.ps1
                  $version = "${{ needs.prepare.outputs.version }}"

                  # 运行PyInstaller构建脚本
                  echo "开始PyInstaller构建..."
                  pwsh -NoProfile -ExecutionPolicy Bypass -File installer/build_installer.ps1 $version -NoPause
                  $buildExitCode = $LASTEXITCODE
                  if ($buildExitCode -ne 0) {
                    echo "❌ build_installer.ps1 失败，退出码: $buildExitCode"
                    if (Test-Path "logs") {
                      echo "=== 输出完整日志（logs/*.log）==="
                      Get-ChildItem -Path "logs" -Filter "*.log" -ErrorAction SilentlyContinue | ForEach-Object {
                        echo ("\n----- LOG START: {0} -----" -f $_.Name)
                        Get-Content -LiteralPath $_.FullName -Raw
                        echo ("----- LOG END: {0} -----\n" -f $_.Name)
                      }
                    } else {
                      echo "(未找到 logs 目录，无法输出日志)"
                    }
                    exit $buildExitCode
                  }
                  echo "✅ build_installer.ps1 执行成功"

                  # 验证构建产物
                  if (Test-Path "installer/dist") {
                    echo "=== 构建产物 ==="
                    Get-ChildItem -Path "installer/dist" -Recurse | ForEach-Object { echo $_.FullName }
                    
                    # 检查关键文件是否存在
                    $requiredFiles = @("RC-main.exe", "RC-GUI.exe", "RC-tray.exe")
                    $missingFiles = @()
                    foreach ($file in $requiredFiles) {
                      if (!(Test-Path "installer/dist/$file")) {
                        $missingFiles += $file
                      }
                    }
                    
                    if ($missingFiles.Count -gt 0) {
                      echo "❌ 缺少关键文件: $($missingFiles -join ', ')"
                      exit 1
                    } else {
                      echo "✅ 所有关键文件构建成功"
                    }
                  } else {
                    echo "❌ 构建输出目录不存在"
                    exit 1
                  }

            - name: List build artifacts
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  echo "=== 构建产物列表 ==="
                  if (Test-Path "installer/dist") {
                    echo "EXE文件:"
                    Get-ChildItem -Path "installer/dist" -Filter "*.exe" | ForEach-Object { 
                      echo "  $($_.Name) ($([math]::Round($_.Length/1MB, 2)) MB)"
                    }
                    
                    echo "安装包:"
                    Get-ChildItem -Path "installer/dist/installer" -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
                      echo "  $($_.Name) ($([math]::Round($_.Length/1MB, 2)) MB)"
                    }
                  }

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4.6.0
              with:
                  name: remote-controls-v${{ needs.prepare.outputs.version }}
                  path: |
                      installer/dist/*.exe
                      installer/dist/installer/*.exe
                  retention-days: 90

            # 【修改】添加发布流程专属条件：仅标签推送/ main分支手动触发 执行更新日志
            - name: Generate changelog
              if: ${{ needs.prepare.outputs.is_tag_push == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
              id: changelog
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  $version = "${{ needs.prepare.outputs.version }}"
                  $tagName = "${{ needs.prepare.outputs.tag_name }}"

                  # 获取上一个标签
                  $previousTag = ""
                  try {
                    $tags = git tag --sort=-version:refname | Select-Object -First 2
                    if ($tags.Count -gt 1) {
                      $previousTag = $tags[1]
                    } else {
                      $previousTag = git rev-list --max-parents=0 HEAD
                    }
                  } catch {
                    $previousTag = "HEAD~10"
                  }

                  echo "当前标签: $tagName"
                  echo "上一个标签: $previousTag"

                  $fullChangelogLink = ""
                  if ($previousTag -and $tagName) {
                    $fullChangelogLink = "https://github.com/${{ github.repository }}/compare/$previousTag...$tagName"
                  }

                  # 检查是否为同版本重复构建
                  $isRepeatVersion = $false
                  $existingRelease = ""
                  try {
                    # 检查是否已存在相同标签的Release
                    $releaseInfo = gh release view $tagName --json body,createdAt 2>$null
                    if ($releaseInfo) {
                      $isRepeatVersion = $true
                      $existingRelease = ($releaseInfo | ConvertFrom-Json).body
                      echo "检测到重复版本: $tagName，将合并更新日志"
                    }
                  } catch {
                    echo "未找到现有Release，创建新的更新日志"
                  }

                  # 优先从 CHANGELOG.md 提取版本更新内容
                  $changelogContent = ""
                  try {
                    if (Test-Path 'CHANGELOG.md') {
                      $changelogFile = Get-Content 'CHANGELOG.md' -Raw
                      # 匹配以 "# V<version>" 开头直到下一个版本标题或文件结尾
                      $escapedVersion = [regex]::Escape($version)
                      $pattern = "(?ms)^#\s*V$escapedVersion\b[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\b|\Z)"
                      $match = [regex]::Match($changelogFile, $pattern)
                      
                      # 如果简单模式不匹配，尝试包含日期的完整模式
                      if (-not $match.Success) {
                        $pattern = "(?ms)^#\s*V$escapedVersion\s*\([\d-]+\)[\s\S]*?(?=^#\s*V\d+\.\d+\.\d+\s*\(|\Z)"
                        $match = [regex]::Match($changelogFile, $pattern)
                      }
                      if ($match.Success) {
                        $section = $match.Value.Trim()
                        # 去掉第一行标题（# Vx.y.z ...）
                        $lines = $section -split "`n"
                        if ($lines.Length -gt 1) {
                          $body = ($lines | Select-Object -Skip 1) -join "`n"
                        } else { $body = $section }
                        $body = $body.Trim()
                        if ($body) {
                          echo "已从 CHANGELOG.md 提取版本更新内容"
                          $changelogContent = $body

                          # 测试标签（如 V3.0.2-test2）发布时：保持文案复用，但将 compare 链接末尾改为完整 tag
                          # 例如：.../compare/V3.0.1...V3.0.2  ->  .../compare/V3.0.1...V3.0.2-test2
                          $isTestTag = "${{ needs.prepare.outputs.is_test_tag }}"
                          if ($isTestTag -eq 'true' -and $tagName -and $version) {
                            $stableTag = "V$version"
                            if ($tagName -ne $stableTag) {
                              $escapedStable = [regex]::Escape($stableTag)

                              # 不依赖 previousTag（测试标签场景下 previousTag 可能是 *-test1），
                              # 直接把 compare 链接末尾的稳定版本 V{version} 替换为完整 tagName。
                              # 兼容：绝对 URL 与相对路径，且避免吞掉结尾的 '>'。
                              $changelogContent = [regex]::Replace(
                                $changelogContent,
                                "((?:https://github\.com/[^/\s]+/[^/\s]+)?/compare/[^\s>]+?\.\.\.)$escapedStable\b",
                                "`$1$tagName"
                              )
                            }
                          }
                        }
                      }
                    }
                  } catch {
                    echo "从 CHANGELOG.md 提取内容失败: $_"
                  }

                  if (-not $changelogContent) {
                    echo "未在 CHANGELOG.md 中找到版本 $version 的段落，后续将使用提交记录生成更新内容"
                  }

                  # 如果还是没有内容，生成commit日志
                  if (-not $changelogContent) {
                    $commitLog = ""
                    if ($previousTag -ne "") {
                      if ($isRepeatVersion) {
                        # 重复版本：获取更广泛的commit历史
                        echo "使用扩展的commit历史"
                        $commits = git log --pretty=format:"- %s (%h)" "HEAD~20..HEAD" | Where-Object { $_ -ne "" }
                      } else {
                        # 新版本：获取与上一个标签的差异
                        $commits = git log --pretty=format:"- %s (%h)" "$previousTag..HEAD" | Where-Object { $_ -ne "" }
                      }
                      
                      if ($commits) {
                        $commitLog = $commits -join "`n"
                      }
                    }

                    # 如果没有commit变更，添加默认说明
                    if (-not $commitLog) {
                      if ($isRepeatVersion) {
                        $commitLog = "- 重新构建和发布优化`n- 修复构建流程和依赖问题"
                      } else {
                        $commitLog = "- 版本发布和构建优化"
                      }
                    }
                    $changelogContent = $commitLog
                  }

                  # 处理重复版本的更新日志合并
                  $versionNote = ""
                  if ($isRepeatVersion) {
                    $versionNote = "🔁 重新构建发布 - $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC`n`n此版本包含之前发布的所有内容，并修复了构建流程问题。`n"
                    
                    # 尝试从现有Release中提取之前的更新内容
                    if ($existingRelease -and $existingRelease.Contains("### 🔄 更新内容")) {
                      $previousContent = $existingRelease -split "### 🔄 更新内容"
                      if ($previousContent.Length -gt 1) {
                        $previousUpdates = ($previousContent[1] -split "### 📚 相关链接")[0].Trim()
                        if ($previousUpdates) {
                          $changelogContent = "**本次重新构建的更新：**`n$changelogContent`n`n**之前版本的更新内容：**`n$previousUpdates"
                        }
                      }
                    }
                  } else {
                    $versionNote = "🚀 自动构建发布 - $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC"
                  }

                  # 生成最终更新日志内容
                  try {
                    # 使用字符串拼接代替Here-String以避免YAML解析问题
                    $links = @(
                      "- [📖 项目文档](https://github.com/${{ github.repository }}/blob/main/README.md)",
                      "- [📋 完整更新日志](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
                    )
                    if ($fullChangelogLink) {
                      $links += "- [🔍 Full Changelog]($fullChangelogLink)"
                    }
                    $links += "- [💾 历史版本](https://github.com/${{ github.repository }}/releases)"

                    $linksSection = ($links -join "`n")

                    $finalChangelog = "$versionNote`n`n### 🔄 更新内容`n$changelogContent`n`n### 📚 相关链接`n$linksSection"

                    echo "📄 生成的更新日志内容长度: $($finalChangelog.Length) 字符"
                    
                    # 验证GITHUB_OUTPUT环境变量
                    if (-not $env:GITHUB_OUTPUT) {
                      echo "❌ GITHUB_OUTPUT环境变量未设置"
                      exit 1
                    }
                    echo "📁 GITHUB_OUTPUT路径: $($env:GITHUB_OUTPUT)"

                    # 将内容写入GitHub输出（处理多行内容）
                    $delimiter = "EOF_$(Get-Random)"
                    # 使用字符串拼接代替Here-String以避免YAML解析问题
                    $outputContent = "changelog<<$delimiter`n$finalChangelog`n$delimiter"
                    $outputContent | Add-Content -Path $env:GITHUB_OUTPUT -Encoding UTF8
                    
                    # 验证输出是否成功写入
                    if (Test-Path $env:GITHUB_OUTPUT) {
                      $fileContent = Get-Content $env:GITHUB_OUTPUT -Raw
                      echo "✅ GitHub输出写入成功，文件大小: $($fileContent.Length) 字符"
                    } else {
                      echo "❌ GitHub输出文件不存在"
                      exit 1
                    }
                    
                  } catch {
                    echo "❌ 生成更新日志时发生错误: $($_.Exception.Message)"
                    echo "错误详情: $($_.Exception)"
                    exit 1
                  }

                  echo "✅ 更新日志生成完成"
                  
                  # 添加调试信息输出
                  echo "=== 调试信息 ==="
                  echo "版本: $version"
                  echo "标签: $tagName"
                  echo "上一个标签: $previousTag"
                  echo "重复版本: $isRepeatVersion"
                  echo "内容长度: $($changelogContent.Length)"
                  echo "最终日志长度: $($finalChangelog.Length)"
                  echo "=== 结束调试 ==="
                  
                  # 确保成功退出
                  exit 0

            # 可选：使用第三方Action生成更专业的更新日志
            - name: Generate Release Notes with GitHub API
              if: false # 设置为 true 启用此功能
              id: release_notes
              uses: mikepenz/release-changelog-builder-action@v4
              with:
                  configuration: |
                      {
                        "categories": [
                          {
                            "title": "## 🚀 新功能",
                            "labels": ["feature", "enhancement"]
                          },
                          {
                            "title": "## 🐛 Bug修复", 
                            "labels": ["bug", "fix"]
                          },
                          {
                            "title": "## 📖 文档更新",
                            "labels": ["documentation", "docs"]
                          },
                          {
                            "title": "## 🔧 其他更新",
                            "labels": []
                          }
                        ],
                        "ignore_labels": ["ignore"],
                        "sort": "ASC",
                        "template": "#{{CHANGELOG}}\n\n**完整更新**: #{{UNCATEGORIZED}}"
                      }
                  fromTag: ${{ github.event.before }}
                  toTag: ${{ github.sha }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            # 原条件保留：仅发布流程执行发行版创建
            - name: Create Release
              if: ${{ needs.prepare.outputs.is_tag_push == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
              id: create_release
              uses: softprops/action-gh-release@v2.1.0
              with:
                  tag_name: ${{ needs.prepare.outputs.tag_name }}
                  name: Remote Controls ${{ needs.prepare.outputs.tag_name }}
                  body: ${{ steps.changelog.outputs.changelog }}
                  draft: false
                  prerelease: ${{ needs.prepare.outputs.is_test_tag == 'true' }}
                  files: |
                      installer/dist/RC-main.exe
                      installer/dist/RC-GUI.exe
                      installer/dist/RC-tray.exe
                      installer/dist/installer/Remote-Controls-Installer-${{ needs.prepare.outputs.version }}.exe
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload logs (on failure)
              if: failure()
              uses: actions/upload-artifact@v4.6.0
              with:
                  name: logs-v${{ needs.prepare.outputs.version }}
                  path: |
                      logs/**/*.log
                      installer/build/**/warn-*.txt
                  retention-days: 30

            - name: Build Summary
              shell: pwsh
              env:
                  PYTHONIOENCODING: utf-8
                  PYTHONUTF8: 1
              run: |
                  # 设置PowerShell输出编码为UTF-8
                  [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
                  $PSDefaultParameterValues['*:Encoding'] = 'utf8'

                  echo "=== 构建总结 ==="
                  echo "版本: ${{ needs.prepare.outputs.version }}"
                  echo "标签: ${{ needs.prepare.outputs.tag_name }}"
                  echo "Python: ${{ env.PYTHON_VERSION }}"
                  echo "触发方式: ${{ github.event_name }}"
                  if ("${{ github.event_name }}" -eq "push") {
                    echo "推送对象: ${{ github.ref_name }} (${{ github.ref_type }})"
                  } else {
                    echo "手动触发版本: ${{ github.event.inputs.version }}"
                  }
                  echo "构建完成 ✅"
