# 自定义主题：命令 (Shell Commands)
[custom_themes.commands]
# 主题 ID (Theme ID)
command1 = "ml006"
# 显示名称 (Display Name)
command1_name = "命令"
# 开关状态 (Status: 0/1)
command1_checked = 1
# 命令内容 (Command Content)
command1_value = "cmd /v:on /c \"for /l %n in (1,1,999999) do @echo %n\""
# 开启时执行的内容 (On Action Value)
command1_on_value = "cmd /v:on /c \"for /l %n in (1,1,999999) do @echo %n\""
# 关闭时执行的内容 (Off Action Value)
command1_off_value = "cmd /v:on /c set"
# 关闭预设 (Off Preset: kill/none/etc.)
command1_off_preset = "custom"
# 窗口模式 (Window Mode: show/hide)
command1_window = "show"
# 最小值 (Min Value)
command1_value_min = 0
# 最大值 (Max Value)
command1_value_max = 100
