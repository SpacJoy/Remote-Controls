# Remote-Controls Configuration File (TOML Format)
# This file is automatically generated. Manual editing is supported.
# 配置文件（TOML 格式）。支持手动编辑，程序保存时会自动更新。

# MQTT 服务器配置 (MQTT Broker Settings)
[mqtt]
# MQTT 服务器地址 (Broker Address)
broker = "bemfa.com"
# 端口号 (Port: 9501 for bemfa)
port = 9501
# 认证模式: private_key / username
auth_mode = "private_key"
# 用户名 (MQTT Username)
mqtt_username = ""
# 密码 (MQTT Password)
mqtt_password = ""
# 客户端 ID (Client ID)
client_id = "********"
# 是否启用 TLS 加密 (Enable TLS: 0/1)
mqtt_tls = 0
# 是否验证证书 (Verify Certificate: 0/1)
mqtt_tls_verify = 0
# CA 证书路径 (CA File Path)
mqtt_tls_ca_file = ""


# 常规设置 (General Settings)
[settings]
# 测试模式 (Test Mode: 0/1)
test = 0
# 消息通知开关 (Notifications: 0/1)
notify = 0
# 界面语言 (Language: zh/en)
language = "zh"


# 内置主题 (Built-in Themes: Topic & Toggle)
[built_in_themes]
# 电脑控制主题 (Computer Control Topic)
Computer = "dnkz006"
# 是否启用电脑控制 (Enable Computer Control: 0/1)
Computer_checked = 1
# 屏幕控制主题 (Screen Control Topic)
screen = "dnpm002"
# 是否启用屏幕控制 (Enable Screen Control: 0/1)
screen_checked = 1
# 音量控制主题 (Volume Control Topic)
volume = "dnyl009"
# 是否启用音量控制 (Enable Volume Control: 0/1)
volume_checked = 1
# 睡眠控制主题 (Sleep Control Topic)
sleep = ""
# 是否启用睡眠控制 (Enable Sleep Control: 0/1)
sleep_checked = 0
# 媒体控制主题 (Media Control Topic)
media = "mtkz009"
# 是否启用媒体控制 (Enable Media Control: 0/1)
media_checked = 1
# 睡眠开启时的动作 (Sleep On Action)
sleep_on_action = "none"
# 睡眠关闭时的动作 (Sleep Off Action)
sleep_off_action = "none"
# 睡眠开启延时 (Sleep On Delay)
sleep_on_delay = 0
# 睡眠关闭延时 (Sleep Off Delay)
sleep_off_delay = 0


# 亮度控制 (Brightness Control)
[brightness]
# 亮度控制模式: wmi / dxva2 / twinkle_tray / custom
brightness_mode = "custom"
# Twinkle Tray 安装路径 (Twinkle Tray Path)
twinkle_tray_path = "C:/Program Files/WindowsApps/38002AlexanderFrangos.TwinkleTray_2025.11225.11438.0_x64__m7qx9dzpwqaze/app/Twinkle Tray.exe"
# 目标模式 (Target Mode: all/id/number)
twinkle_tray_target_mode = "all"
# 目标值 (Target Value)
twinkle_tray_target_value = "0"
# 是否显示亮度浮层 (Show Overlay: 0/1)
twinkle_tray_overlay = 1
# 自定义控制顺序 (Custom Strategy List: e.g. wmi,dxva2)
brightness_custom_list = "wmi,dxva2"
# 自定义策略: all (全部执行) / success (成功即止)
brightness_custom_strategy = "all"


# 其他杂项 (Miscellaneous)
[other]
# 电脑开启时的动作 (On Action: lock/shutdown/restart/none)
computer_on_action = "lock"
# 电脑关闭时的动作 (Off Action: shutdown/lock/restart/none)
computer_off_action = "shutdown"
# 开启延时秒数 (On Delay Seconds)
computer_on_delay = 0
# 关闭延时秒数 (Off Delay Seconds)
computer_off_delay = 0
# WMI 目标显示器 (WMI Target: all/number)
wmi_target = "all"
# Dxva2 目标显示器 (Dxva2 Target: all/number)
dxva2_target = "all"


# 自定义主题：程序或脚本 (Applications / Scripts)
[custom_themes.applications]
